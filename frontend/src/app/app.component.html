<!-- Banner global de conectividad / sincronización -->
<div
  *ngIf="bannerState"
  class="app-banner"
  [ngClass]="bannerClass"
  role="alert"
  aria-live="polite"
>
  <span class="app-banner__msg">{{ bannerMsg }}</span>
  <button
    type="button"
    class="app-banner__close"
    (click)="dismissBanner()"
    aria-label="Cerrar"
  >✕</button>
</div>

<!-- Contenido principal de la SPA -->
<router-outlet />
