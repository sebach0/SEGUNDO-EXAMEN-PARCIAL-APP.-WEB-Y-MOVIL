name: mobile_emergencias
description: Plataforma Inteligente de Atención de Emergencias Vehiculares - App Móvil
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP client con soporte de interceptores
  dio: ^5.4.0
  
  # Almacenamiento seguro para tokens JWT
  flutter_secure_storage: ^9.0.0
  
  # Navegación declarativa
  go_router: ^17.2.1
  
  # Iconos
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^3.3.1
  shadcn_ui: ^0.53.6
  shared_preferences: ^2.5.5
  flutter_dotenv: ^5.2.1

  # Emergencias
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
  image_picker: ^1.1.2
  # 6.x evita record_linux 0.7.x incompatible con record_platform_interface 1.5 (fallo al compilar).
  record: ^6.2.0
  path_provider: ^2.1.4
  http_parser: ^4.0.2
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  flutter_stripe: ^12.6.0
  url_launcher: ^6.3.1
  intl: ^0.20.2

  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.5
  flutter_local_notifications: ^21.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
